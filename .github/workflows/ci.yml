name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff==0.14.4
      - name: ruff check (lint)
        run: ruff check .
      - name: ruff format (style)
        run: ruff format --check .

  security:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pip-audit==2.10.1
      - name: Audit pinned runtime dependencies
        run: pip-audit --strict -r requirements.txt

  test:
    name: Test & coverage
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest coverage cython

      - name: Verify dependency consistency
        run: pip check

      - name: Install coverage
        run: pip install coverage==7.14.3

      - name: Core validation suites + coverage (>= 80%)
        env:
          QT_QPA_PLATFORM: offscreen
        shell: pwsh
        run: |
          python -m coverage erase
          $suites = @(
            "tests/validate_docs.py",
            "tests/validate_products.py",
            "tests/validate_security_scan.py",
            "tests/validate_license.py",
            "tests/validate_vault.py",
            "tests/validate_intake.py",
            "tests/validate_search.py",
            "tests/validate_rag.py",
            "tests/validate_backup.py",
            "tests/validate_wakilios_backend.py",
            "tests/validate_wakilios_api.py",
            "tests/validate_e2e.py",
            "tests/validate_extraction.py",
            "tests/validate_docling_runtime.py"
          )
          foreach ($s in $suites) {
            Write-Host "=== $s ==="
            python -m coverage run -a --source=core,licensing,vault,intake,search,rag,backup,wakilios,ui $s
            if ($LASTEXITCODE -ne 0) { exit 1 }
          }
          python -m coverage report --fail-under=60

      - name: UI validation (no coverage, needs PySide6)
        env:
          QT_QPA_PLATFORM: offscreen
        run: python tests/validate_ui.py

      - name: Selftest
        run: python main.py --selftest

  package:
    name: Build bundle (smoke)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Detect packaging spec
        id: spec
        shell: pwsh
        run: |
          if (Test-Path main.spec) {
            "present=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            "present=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "no main.spec yet; skipping bundle build"
          }

      - name: Install dependencies
        if: steps.spec.outputs.present == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install cython

      - name: Prepare verified document runtime
        env:
          TESSERACT_RUNTIME_URL: ${{ secrets.TESSERACT_RUNTIME_URL }}
          TESSERACT_RUNTIME_SHA256: ${{ secrets.TESSERACT_RUNTIME_SHA256 }}
          TESSERACT_RUNTIME_VERSION: ${{ secrets.TESSERACT_RUNTIME_VERSION }}
        shell: pwsh
        run: |
          if (-not $env:TESSERACT_RUNTIME_URL -or -not $env:TESSERACT_RUNTIME_SHA256 -or -not $env:TESSERACT_RUNTIME_VERSION) { throw "Pinned Tesseract runtime secrets are required" }
          python scripts/prepare_document_runtime.py --tesseract-url $env:TESSERACT_RUNTIME_URL --tesseract-sha256 $env:TESSERACT_RUNTIME_SHA256 --tesseract-version $env:TESSERACT_RUNTIME_VERSION

      - name: Install Cython (obfuscation build tool)
        if: steps.spec.outputs.present == 'true'
        run: pip install "cython>=3,<4"

      - name: Obfuscate licensing (Cython -> .pyd)
        if: steps.spec.outputs.present == 'true'
        run: python scripts/obfuscate_licensing.py

      - name: Build one-folder bundle (PyInstaller)
        if: steps.spec.outputs.present == 'true'
        run: pyinstaller main.spec --noconfirm --clean

      - name: Bundle self-test
        if: steps.spec.outputs.present == 'true'
        env:
          QT_QPA_PLATFORM: offscreen
        run: dist\DocumentVaultIngestionEngine\DocumentVaultIngestionEngine.exe --selftest

      - name: Validate bundled document runtimes
        if: steps.spec.outputs.present == 'true'
        run: |
          python tests/validate_docling_runtime.py
          python tests/validate_ocr_runtime.py
          python tests/validate_package.py

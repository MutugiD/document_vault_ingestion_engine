name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"

jobs:
  validate:
    name: Validate documentation and skeleton
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation tools
        run: python -m pip install --upgrade pip ruff cryptography PyMuPDF python-docx

      - name: Validate documentation pack
        run: python tests\validate_docs.py

      - name: Validate Python skeleton
        run: python tests\validate_skeleton.py

      - name: Validate licensing
        run: python tests\validate_license.py

      - name: Validate encrypted vault
        run: python tests\validate_vault.py

      - name: Validate document intake
        run: python tests\validate_intake.py

      - name: Validate extraction and OCR boundary
        run: python tests\validate_extraction.py

      - name: Validate matter search
        run: python tests\validate_search.py

      - name: Validate backup restore
        run: python tests\validate_backup.py

      - name: Run application selftest
        run: python main.py --selftest

      - name: Lint Python files
        run: ruff check .

name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"

jobs:
  validate:
    name: Validate documentation and skeleton
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation tools
        run: python -m pip install --upgrade pip ruff cryptography PyMuPDF python-docx PySide6 pyinstaller

      - name: Validate documentation pack
        run: python tests\validate_docs.py

      - name: Validate Python skeleton
        run: python tests\validate_skeleton.py

      - name: Validate published products
        run: python tests\validate_products.py

      - name: Validate security scan
        run: python tests\validate_security_scan.py

      - name: Validate licensing
        run: python tests\validate_license.py

      - name: Validate AI provider key settings
        run: python tests\validate_ai_providers.py

      - name: Validate encrypted vault
        run: python tests\validate_vault.py

      - name: Validate document intake
        run: python tests\validate_intake.py

      - name: Validate extraction and OCR boundary
        run: python tests\validate_extraction.py

      - name: Validate OCR runtime bundle contract
        run: python tests\validate_ocr_runtime.py

      - name: Validate matter search
        run: python tests\validate_search.py

      - name: Validate Local Matter RAG Connector
        run: python tests\validate_rag.py

      - name: Validate backup restore
        run: python tests\validate_backup.py

      - name: Validate managed cloud boundary
        run: python tests\validate_cloud_boundary.py

      - name: Validate UI shell
        run: python tests\validate_ui.py

      - name: Validate packaging configuration
        run: python tests\validate_package.py

      - name: Validate end-to-end product flow
        run: python tests\validate_e2e.py

      - name: Validate real-world RAG end-to-end flow
        run: python tests\validate_real_world_rag_e2e.py

      - name: Validate public Kenyan document E2E flow
        run: python tests\validate_public_kenyan_e2e.py

      - name: Validate manual private-document smoke runner
        run: python tests\validate_manual_ingest_smoke.py

      - name: Validate frozen Windows build
        run: python tests\validate_frozen_build.py

      - name: Validate release bundle
        run: python tests\validate_release_bundle.py

      - name: Validate portable install smoke
        run: python tests\validate_portable_install.py

      - name: Run application selftest
        run: python main.py --selftest

      - name: Lint Python files
        run: ruff check .
